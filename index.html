<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Import OCR — Delivery Order Extractor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 600px; width: 90%; text-align: center; }
  h1 { font-size: 2rem; margin-bottom: .25rem; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: .95rem; }
  .dropzone { border: 2px dashed #334155; border-radius: 16px; padding: 3rem 2rem; cursor: pointer; transition: all .2s; background: #1e293b; }
  .dropzone:hover, .dropzone.active { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 30px rgba(56,189,248,.1); }
  .dropzone svg { width: 48px; height: 48px; margin-bottom: 1rem; color: #38bdf8; }
  .dropzone p { color: #94a3b8; }
  .dropzone .hint { font-size: .8rem; margin-top: .5rem; color: #475569; }
  input[type=file] { display: none; }
  .status { margin-top: 1.5rem; min-height: 2rem; }
  .status.processing { color: #facc15; }
  .status.success { color: #4ade80; }
  .status.error { color: #f87171; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #facc15; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 3rem; font-size: .75rem; color: #475569; }
</style>
</head>
<body>
<div class="container">
  <h1>Delivery Order Extractor</h1>
  <p class="subtitle">Upload a delivery order image &rarr; get a structured Excel file</p>

  <div class="dropzone" id="dropzone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
    <p>Drag & drop your image here</p>
    <p class="hint">or click to browse — JPG, PNG, PDF</p>
  </div>
  <input type="file" id="fileInput" accept="image/*,.pdf">

  <div class="status" id="status"></div>
  <footer>Food Import OCR POC &bull; Simulated AI Extraction</footer>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('active'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('active'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('active');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  status.className = 'status processing';
  status.innerHTML = '<span class="spinner"></span> Extracting data from image…';

  const fd = new FormData();
  fd.append('image', file);

  try {
    const res = await fetch('/upload', { method: 'POST', body: fd });
    if (!res.ok) throw new Error('Server error');

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = res.headers.get('content-disposition')?.match(/filename=\"(.+)\"/)?.[1] || 'delivery-order.xlsx';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    status.className = 'status success';
    status.textContent = '✓ Excel file downloaded successfully!';
  } catch (err) {
    status.className = 'status error';
    status.textContent = '✗ Upload failed — ' + err.message;
  }
}
</script>
</body>
</html>
